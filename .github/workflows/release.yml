name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Clean build directories
        run: rm -rf build dist

      - name: Build distributions
        run: python -m build

      - name: Verify built artifacts match tag
        run: |
          python - <<'PY'
          import pathlib

          expected = "${{ github.ref_name }}".removeprefix("v")
          dist_dir = pathlib.Path("dist")
          files = [path.name for path in dist_dir.iterdir() if path.is_file()]
          if not files:
              raise SystemExit("No distribution artifacts were built")

          expected_wheel = f"xian_tech_cli-{expected}-py3-none-any.whl"
          expected_sdist = f"xian_tech_cli-{expected}.tar.gz"
          if files != [expected_sdist, expected_wheel] and files != [
              expected_wheel,
              expected_sdist,
          ]:
              raise SystemExit(
                  "Built artifacts do not match the expected release set for "
                  f"{expected}: {files}"
              )
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  smoke-install:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Smoke test wheel install
        run: python scripts/release_smoke_test.py --dist-dir dist

  publish:
    needs:
      - build
      - smoke-install
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/xian-tech-cli
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "xian-tech-cli ${GITHUB_REF_NAME#v}" \
            --generate-notes
