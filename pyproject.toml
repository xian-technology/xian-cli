[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xian-cli"
version = "0.1.0"
description = "Operator CLI for Xian networks and nodes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pynacl>=1.5.0",
]

[project.scripts]
xian = "xian_cli.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

